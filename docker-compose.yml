version: '3.8'

services:
  qiyam-api:
    build: .
    container_name: qiyam-core-api
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=ollama
      - WHATSAPP_VERIFY_TOKEN=qiyam_secure_token_123
      - SQLITE_DB_PATH=/app/data/qiyam.db
      - REDIS_URL=redis://qiyam-redis:6379/0
      - DATABASE_URL=postgresql://qiyam_user:qiyam_password_123@qiyam-postgres:5432/qiyam_db
    volumes:
      - ./data:/app/data
      - ./plugins:/app/plugins
      - ./exports:/app/exports
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - ollama-inference
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G

  ollama-inference:
    image: ollama/ollama:latest
    container_name: qiyam-llm-engine
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: always
    # Uncomment below to enable GPU acceleration if available
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  qiyam-neo4j:
    image: neo4j:latest
    container_name: qiyam-graph-db
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/qiyam_graph_123
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  qiyam-redis:
    image: redis:alpine
    container_name: qiyam-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  qiyam-postgres:
    image: postgres:15-alpine
    container_name: qiyam-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=qiyam_user
      - POSTGRES_PASSWORD=qiyam_password_123
      - POSTGRES_DB=qiyam_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qiyam-celery-worker:
    build: .
    container_name: qiyam-celery-worker
    command: celery -A core.worker worker --loglevel=info
    environment:
      - LLM_PROVIDER=ollama
      - REDIS_URL=redis://qiyam-redis:6379/0
      - DATABASE_URL=postgresql://qiyam_user:qiyam_password_123@qiyam-postgres:5432/qiyam_db
    volumes:
      - ./data:/app/data
      - ./plugins:/app/plugins
      - ./exports:/app/exports
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - qiyam-redis
      - qiyam-postgres
      - ollama-inference
    restart: unless-stopped

volumes:
  ollama_models:
  neo4j_data:
  postgres_data:
